<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoneyMadeEasy - Login</title>
    <meta name="description" content="Log in to MoneyMadeEasy with a local browser profile name." />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-emerald-900 to-emerald-700 min-h-screen flex flex-col">
    <main class="flex-1 flex items-center justify-center p-4">
        <div class="w-full max-w-md">
            <div class="bg-white p-8 rounded-3xl shadow-2xl space-y-6 text-center">
                <div>
                    <span class="text-6xl block mb-2">💰</span>
                    <h1 class="text-3xl font-black text-gray-900">MoneyMadeEasy</h1>
                    <p class="text-sm text-gray-500 mt-2">Pro Financial Dashboard</p>
                </div>

                <div class="bg-emerald-50 border-l-4 border-emerald-600 p-4 rounded text-left">
                    <p class="text-xs text-gray-700">
                        <span class="font-bold">Demo Tip:</span>
                        Enter any profile name to get started.
                    </p>
                </div>

                <div class="bg-yellow-50 border-l-4 border-yellow-500 p-4 rounded text-left">
                    <p class="text-xs text-yellow-900">
                        <span class="font-bold">Local Data Notice:</span>
                        This demo stores your data only in this browser using localStorage.
                    </p>
                </div>

                <form id="loginForm" class="space-y-4 text-left">
                    <div class="space-y-3">
                        <label for="usernameInput" class="text-xs font-bold text-gray-700 tracking-wide uppercase">
                            Profile Name
                        </label>
                        <input
                            id="usernameInput"
                            type="text"
                            maxlength="24"
                            autocomplete="name"
                            placeholder="e.g., Marcus"
                            class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-600 text-gray-800"
                        />
                        <p id="errorMessage" class="text-xs text-red-600 font-semibold hidden">
                            Please enter a valid profile name.
                        </p>
                    </div>

                    <button
                        type="submit"
                        class="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold p-3 rounded-xl transition-all shadow-lg"
                    >
                        Enter Dashboard →
                    </button>
                </form>

                <p class="text-xs text-gray-500 mt-6">
                    No account needed • Data saved locally
                </p>
            </div>
        </div>
    </main>

    <!-- Copyright Footer -->
    <footer class="border-t border-emerald-800/40 bg-emerald-950/30 py-4 text-center text-xs font-semibold text-emerald-100">
        © 2026 MoneyMadeEasy
    </footer>

    <script>
        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.classList.remove('hidden');
        }

        function clearError() {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.classList.add('hidden');
        }

        function handleLogin(event) {
            if (event) {
                event.preventDefault();
            }

            const usernameInput = document.getElementById('usernameInput');
            const userInput = usernameInput.value.trim().replace(/\s+/g, ' ');

            if (!userInput || userInput.length < 2) {
                showError('Please enter a profile name with at least 2 characters.');
                usernameInput.focus();
                return;
            }

            clearError();
            localStorage.setItem('mme_logged_user', userInput);
            window.location.assign('./dashboard.html');
        }

        window.addEventListener('DOMContentLoaded', function () {
            const loginForm = document.getElementById('loginForm');
            const usernameInput = document.getElementById('usernameInput');

            loginForm.addEventListener('submit', handleLogin);

            usernameInput.addEventListener('input', function () {
                if (usernameInput.value.trim()) {
                    clearError();
                }
            });

            usernameInput.focus();
        });
    </script>
</body>
</html>
