<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale>    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind CSS from jsDelivr CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js from jsDelivr CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body class="bg-emerald-50 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">

        <!-- Header -->
        <header class="flex flex-col md:flex-row gap-4 md:gap-0 justify-between items-start md:items-center bg-emerald-900 p-6 rounded-2xl shadow-sm text-white">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-emerald-300">💰 MoneyMadeEasy</h1>
                <p class="text-sm text-emerald-100">
                    Budgeting Dashboard for
                    <span id="userGreeting" class="font-bold text-white underline">User</span>
                </p>
            </div>

            <div class="flex flex-wrap items-center gap-3">
                <select
                    id="monthFilter"
                    class="bg-emerald-800 text-emerald-100 font-bold p-2 px-4 rounded-xl border border-emerald-700 focus:outline-none"
                ></select>

                <a href="./dashboard.html" class="bg-emerald-700 hover:bg-emerald-800 text-xs font-bold p-2 px-3 rounded-xl text-white transition-all">
                    ← Dashboard
                </a>

                <a href="./investments.html" class="bg-blue-700 hover:bg-blue-800 text-xs font-bold p-2 px-3 rounded-xl text-white transition-all">
                    📈 Investments
                </a>

                <button onclick="handleLogout()" class="bg-red-700 hover:bg-red-800 text-xs font-bold p-2 px-3 rounded-xl text-white transition-all">
                    Sign Out
                </button>
            </div>
        </header>

        <!-- Budget Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <div class="bg-white p-6 rounded-2xl shadow border border-gray-100">
                <p class="text-sm text-gray-500 font-semibold">Monthly Income</p>
                <p id="monthlyIncome" class="text-4xl font-black text-emerald-700 mt-2">$0.00</p>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow border border-gray-100">
                <p class="text-sm text-gray-500 font-semibold">Monthly Expenses</p>
                <p id="totalExpense" class="text-4xl font-black text-red-600 mt-2">$0.00</p>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow border border-gray-100">
                <p class="text-sm text-gray-500 font-semibold">Net Savings</p>
                <p id="balance" class="text-4xl font-black text-emerald-700 mt-2">$0.00</p>
            </div>

        </div>

        <!-- Main Budgeting Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <!-- Add Transaction -->
            <div class="bg-white p-6 rounded-2xl shadow border border-gray-100 space-y-4">
                <h2 class="text-xl font-bold text-gray-800">Add Transaction</h2>

                <div class="space-y-3">
                    <input
                        id="desc"
                        type="text"
                        placeholder="Description e.g. Salary, Rent, Lunch"
                        class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-600 text-gray-800"
                    />

                    <input
                        id="amount"
                        type="number"
                        placeholder="Amount e.g. 5000 or -50"
                        class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-600 text-gray-800"
                    />

                    <select
                        id="category"
                        class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-600 text-gray-800"
                    >
                        <option value="Income">💰 Income / Paycheck</option>
                        <option value="Housing">🏠 Rent / Housing</option>
                        <option value="Food">🍔 Food & Dining</option>
                        <option value="Transport">🚗 Gas / Transit</option>
                        <option value="Leisure">🎉 Entertainment / Fun</option>
                        <option value="Savings">📈 Investments / Savings</option>
                    </select>

                    <button
                        onclick="addTransaction()"
                        class="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold p-3 rounded-xl transition-all shadow-md"
                    >
                        Log Transaction
                    </button>
                </div>

                <hr class="border-gray-100 my-4" />

                <h3 class="font-bold text-gray-700 mb-2">Monthly History</h3>
                <ul id="list" class="divide-y divide-gray-100 max-h-80 overflow-y-auto pr-1"></ul>
            </div>

            <!-- Category Chart -->
            <div class="bg-white p-6 rounded-2xl shadow border border-gray-100 flex flex-col justify-between">
                <div>
                    <h2 class="text-xl font-bold text-gray-800 mb-1">Category Breakdown</h2>
                    <p class="text-xs text-gray-500 mb-4">Expense breakdown for selected month</p>
                </div>

                <div class="w-full max-w-[300px] mx-auto relative h-72">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <!-- Insights -->
            <div class="bg-white p-6 rounded-2xl shadow border border-gray-100 flex flex-col">
                <div class="flex items-center space-x-2 mb-4">
                    <span class="p-2 bg-emerald-100 rounded-lg text-emerald-800">✨</span>
                    <h2 class="text-xl font-bold text-gray-800">Budget Insights</h2>
                </div>

                <div
                    id="aiConsole"
                    class="flex-1 bg-gray-50 rounded-xl p-4 border border-gray-200 space-y-3 overflow-y-auto max-h-[380px]"
                ></div>
            </div>

        </div>
    </div>

    <script>
        let currentUser = localStorage.getItem('mme_logged_user') || null;
        let transactions = JSON.parse(localStorage.getItem('pro_transactions')) || [];
        let myChart = null;

        function formatCurrency(value) {
            return `$${Number(value || 0).toFixed(2)}`;
        }

        function saveTransactions() {
            localStorage.setItem('pro_transactions', JSON.stringify(transactions));
        }

        function handleLogout() {
            localStorage.removeItem('mme_logged_user');
            window.location.href = './index.html';
        }

        function generateMonthOptions() {
            const monthSelect = document.getElementById('monthFilter');
            monthSelect.innerHTML = '';

            const today = new Date();

            for (let i = -6; i <= 6; i++) {
                const date = new Date(today.getFullYear(), today.getMonth() + i, 1);
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');

                const option = document.createElement('option');
                option.value = `${year}-${month}`;
                option.textContent = date.toLocaleString('default', {
                    month: 'long',
                    year: 'numeric'
                });

                if (i === 0) {
                    option.selected = true;
                }

                monthSelect.appendChild(option);
            }

            monthSelect.addEventListener('change', updateUI);
        }

        function getSelectedMonth() {
            return document.getElementById('monthFilter').value;
        }

        function migrateOldTransactions() {
            if (!currentUser) return;

            let changed = false;

            transactions = transactions.map(transaction => {
                if (!transaction.owner) {
                    changed = true;
                    return {
                        ...transaction,
                        owner: currentUser
                    };
                }

                return transaction;
            });

            if (changed) {
                saveTransactions();
            }
        }

        function checkAuth() {
            if (!currentUser) {
                window.location.href = './index.html';
                return;
            }

            document.getElementById('userGreeting').textContent = currentUser;

            migrateOldTransactions();
            generateMonthOptions();
            updateUI();
        }

        function addTransaction() {
            const descInput = document.getElementById('desc');
            const amountInput = document.getElementById('amount');
            const categoryInput = document.getElementById('category');

            const desc = descInput.value.trim();
            const amount = parseFloat(amountInput.value);
            const category = categoryInput.value;
            const currentMonth = getSelectedMonth();

            if (!desc || isNaN(amount)) {
                alert('Please input a valid description and amount.');
                return;
            }

            const transaction = {
                id: Date.now(),
                desc,
                amount,
                category,
                month: currentMonth,
                owner: currentUser,
                date: new Date().toISOString()
            };

            transactions.push(transaction);
            saveTransactions();

            descInput.value = '';
            amountInput.value = '';

            updateUI();
        }

        function deleteTransaction(transactionId) {
            if (!confirm('Delete this transaction?')) return;

            transactions = transactions.filter(transaction => transaction.id !== transactionId);
            saveTransactions();
            updateUI();
        }

        function updateUI() {
            const currentMonth = getSelectedMonth();

            const monthlyData = transactions.filter(transaction =>
                transaction.owner === currentUser &&
                transaction.month === currentMonth
            );

            let netBalance = 0;
            let totalExpense = 0;
            let totalIncome = 0;

            const categories = {
                Housing: 0,
                Food: 0,
                Transport: 0,
                Leisure: 0,
                Savings: 0
            };

            monthlyData.forEach(transaction => {
                const amount = Number(transaction.amount || 0);

                netBalance += amount;

                if (amount < 0) {
                    totalExpense += Math.abs(amount);

                    if (categories[transaction.category] !== undefined) {
                        categories[transaction.category] += Math.abs(amount);
                    }
                } else {
                    if (transaction.category === 'Income') {
                        totalIncome += amount;
                    }

                    if (transaction.category === 'Savings') {
                        categories.Savings += amount;
                    }
                }
            });

            document.getElementById('monthlyIncome').textContent = formatCurrency(totalIncome);
            document.getElementById('totalExpense').textContent = formatCurrency(totalExpense);

            const balance = document.getElementById('balance');
            balance.textContent = formatCurrency(netBalance);
            balance.className = `text-4xl font-black mt-2 ${netBalance < 0 ? 'text-red-600' : 'text-emerald-700'}`;

            renderTransactionList(monthlyData);
            renderChart(categories, totalExpense);
            generateBudgetInsights(netBalance, totalExpense, totalIncome, categories);
        }

        function renderTransactionList(monthlyData) {
            const list = document.getElementById('list');
            list.innerHTML = '';

            if (monthlyData.length === 0) {
                const emptyItem = document.createElement('li');
                emptyItem.className = 'text-sm text-gray-500 text-center py-4';
                emptyItem.textContent = 'No transactions logged for this month yet.';
                list.appendChild(emptyItem);
                return;
            }

            monthlyData.forEach(transaction => {
                const amount = Number(transaction.amount || 0);

                const li = document.createElement('li');
                li.className = 'flex justify-between py-2 text-sm items-center hover:bg-gray-50 px-2 rounded';

                const leftDiv = document.createElement('div');

                const desc = document.createElement('p');
                desc.className = 'font-semibold text-gray-800';
                desc.textContent = transaction.desc;

                const category = document.createElement('p');
                category.className = 'text-xs text-gray-500';
                category.textContent = transaction.category;

                leftDiv.appendChild(desc);
                leftDiv.appendChild(category);

                const rightDiv = document.createElement('div');
                rightDiv.className = 'flex items-center space-x-2';

                const amountText = document.createElement('span');
                amountText.className = `font-bold ${amount < 0 ? 'text-red-500' : 'text-emerald-600'}`;
                amountText.textContent = `${amount < 0 ? '-' : '+'}${formatCurrency(Math.abs(amount))}`;

                const deleteButton = document.createElement('button');
                deleteButton.className = 'ml-2 p-1 bg-red-100 hover:bg-red-200 text-red-600 rounded text-xs font-bold transition';
                deleteButton.textContent = '✕';
                deleteButton.onclick = function () {
                    deleteTransaction(transaction.id);
                };

                rightDiv.appendChild(amountText);
                rightDiv.appendChild(deleteButton);

                li.appendChild(leftDiv);
                li.appendChild(rightDiv);

                list.appendChild(li);
            });
        }

        function renderChart(categoryData, totalExpense) {
            const chartCanvas = document.getElementById('categoryChart');

            if (!chartCanvas) return;

            const ctx = chartCanvas.getContext('2d');

            if (myChart) {
                myChart.destroy();
            }

            const labels = [];
            const values = [];

            Object.keys(categoryData).forEach(category => {
                const value = categoryData[category];

                if (value > 0) {
                    const pct = totalExpense > 0 ? ((value / totalExpense) * 100).toFixed(0) : 0;
                    labels.push(`${category} (${pct}%)`);
                    values.push(value);
                }
            });

            if (labels.length === 0) {
                labels.push('No Expenses');
                values.push(1);
            }

            myChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels,
                    datasets: [{
                        data: values,
                        backgroundColor: [
                            '#022c22',
                            '#065f46',
                            '#0f766e',
                            '#10b981',
                            '#6ee7b7'
                        ],
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                boxWidth: 10,
                                font: {
                                    size: 10
                                }
                            }
                        }
                    },
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        function generateBudgetInsights(balance, expenses, income, cats) {
            const aiConsole = document.getElementById('aiConsole');
            aiConsole.innerHTML = '';

            const insights = [];

            if (balance < 0) {
                insights.push({
                    type: 'danger',
                    title: 'Deficit Alert',
                    text: 'Your expenses are higher than your income this month. Review flexible spending categories first.'
                });
            }

            if (expenses > 0 && cats.Leisure / expenses > 0.20) {
                insights.push({
                    type: 'warning',
                    title: 'High Leisure Spending',
                    text: `Leisure spending is ${(cats.Leisure / expenses * 100).toFixed(0)}% of expenses.`
                });
            }

            if (income > 0 && cats.Savings / income < 0.20) {
                insights.push({
                    type: 'info',
                    title: 'Savings Opportunity',
                    text: 'Savings are below 20% of income this month. Consider increasing savings if your budget allows.'
                });
            }

            if (expenses > 0 && cats.Food / expenses > 0.30) {
                insights.push({
                    type: 'warning',
                    title: 'Food Spending Check',
                    text: `Food spending is ${(cats.Food / expenses * 100).toFixed(0)}% of expenses.`
                });
            }

            if (insights.length === 0) {
                insights.push({
                    type: 'success',
                    title: 'Healthy Monthly Budget',
                    text: 'No major budget issues detected for this month.'
                });
            }

            insights.forEach(item => {
                const colors = {
                    danger: 'bg-red-50 border-red-200 text-red-800',
                    warning: 'bg-amber-50 border-amber-200 text-amber-800',
                    info: 'bg-emerald-50 border-emerald-200 text-emerald-800',
                    success: 'bg-emerald-950 text-emerald-100 border-emerald-900'
                };

                const div = document.createElement('div');
                div.className = `p-3 rounded-xl border ${colors[item.type]} text-xs`;

                const title = document.createElement('p');
                title.className = 'font-bold mb-0.5';
                title.textContent = `💡 ${item.title}`;

                const text = document.createElement('p');
                text.textContent = item.text;

                div.appendChild(title);
                div.appendChild(text);

                aiConsole.appendChild(div);
            });
        }

        window.addEventListener('DOMContentLoaded', checkAuth);
    </script>
</body>
</html>
