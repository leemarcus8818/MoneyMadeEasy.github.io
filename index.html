<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyMadeEasy - Login</title>
    
    <!-- Tailwind CSS from jsDelivr CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-emerald-900 to-emerald-700 min-h-screen flex items-center justify-center p-4">

    <!-- LOGIN PANEL -->
    <div class="w-full max-w-md">
        <div class="bg-white p-8 rounded-3xl shadow-2xl space-y-6 text-center">
            <div>
                <span class="text-6xl block mb-2">💰</span>
                <h1 class="text-3xl font-black text-gray-900">MoneyMadeEasy</h1>
                <p class="text-sm text-gray-500 mt-2">Pro Financial Dashboard</p>
            </div>
            
            <div class="bg-emerald-50 border-l-4 border-emerald-600 p-4 rounded text-left">
                <p class="text-xs text-gray-700"><span class="font-bold">Demo Tip:</span> Enter any profile name to get started</p>
            </div>

            <div class="space-y-3 text-left">
                <label class="text-xs font-bold text-gray-700 tracking-wide uppercase">Profile Name</label>
                <input id="usernameInput" type="text" placeholder="e.g., Marcus, Sarah" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-600 text-gray-800" onkeypress="if(event.key === 'Enter') handleLogin()">
            </div>

            <button onclick="handleLogin()" class="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold p-3 rounded-xl transition-all shadow-lg">
                Enter Dashboard →
            </button>

            <p class="text-xs text-gray-500 mt-6">No account needed • Data saved locally</p>
        </div>
    </div>

    <script>
        function handleLogin() {
            const userInput = document.getElementById('usernameInput').value.trim();
            if (!userInput) {
                alert('Please enter a profile name.');
                return;
            }
            
            localStorage.setItem('mme_logged_user', userInput);
            window.location.href = './dashboard.html';
        }

        // If already logged in, redirect to dashboard
        if (localStorage.getItem('mme_logged_user')) {
            window.location.href = './dashboard.html';
        }
    </script>
</body>
</html>
