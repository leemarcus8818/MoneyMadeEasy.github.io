<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyMadeEasy Pro</title>
    <!-- Tailwind CSS for sleek layout -->
    <script src="https://jsdelivr.net"></script>
    <!-- Chart.js for beautiful visual graphs -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-xs border border-gray-100">
            <div>
                <h1 class="text-3xl font-black text-gray-900 tracking-tight">💰 MoneyMadeEasy</h1>
                <p class="text-sm text-gray-500">Your AI-Powered Personal Wealth Companion</p>
            </div>
            <!-- Month Picker Tracker -->
            <div>
                <select id="monthFilter" onchange="updateUI()" class="bg-gray-100 text-gray-800 font-bold p-2 px-4 rounded-xl border-none focus:ring-2 focus:ring-blue-500">
                    <option value="2026-06">June 2026</option>
                    <option value="2026-05">May 2026</option>
                    <option value="2026-04">April 2026</option>
                </select>
            </div>
        </header>

        <!-- Main Dashboard Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Column 1: Financial Input & Transactions -->
            <div class="bg-white p-6 rounded-2xl shadow-xs border border-gray-100 space-y-4">
                <h2 class="text-xl font-bold text-gray-800">Add Transaction</h2>
                <div class="space-y-3">
                    <input id="desc" type="text" placeholder="Description (e.g., Target, Salary)" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 focus:outline-blue-500">
                    <input id="amount" type="number" placeholder="Amount (e.g., 2500 or -45)" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 focus:outline-blue-500">
                    
                    <select id="category" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 focus:outline-blue-500">
                        <option value="Income">💰 Income / Paycheck</option>
                        <option value="Housing">🏠 Rent / Housing</option>
                        <option value="Food">🍔 Food & Dining</option>
                        <option value="Transport">🚗 Gas / Transit</option>
                        <option value="Leisure">🎉 Entertainment / Fun</option>
                        <option value="Savings">📈 Investments / Savings</option>
                    </select>

                    <button onclick="addTransaction()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded-xl transition-all shadow-md shadow-blue-100">Log Item</button>
                </div>

                <hr class="border-gray-100 my-4">

                <h3 class="font-bold text-gray-700 mb-2">Monthly History</h3>
                <ul id="list" class="divide-y divide-gray-100 max-h-60 overflow-y-auto pr-1"></ul>
            </div>

            <!-- Column 2: Visual Category Breakdown -->
            <div class="bg-white p-6 rounded-2xl shadow-xs border border-gray-100 flex flex-col justify-between">
                <div>
                    <h2 class="text-xl font-bold text-gray-800 mb-1">Category Breakdown</h2>
                    <p class="text-xs text-gray-400 mb-4">Where your hard-earned cash goes</p>
                </div>
                <div class="w-full max-w-[280px] mx-auto">
                    <canvas id="categoryChart"></canvas>
                </div>
                <div class="mt-4 pt-4 border-t border-gray-100 flex justify-between">
                    <div>
                        <p class="text-xs text-gray-400">Total Expenses</p>
                        <p id="totalExpense" class="text-xl font-bold text-red-600">$0.00</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-gray-400">Net Savings</p>
                        <p id="balance" class="text-xl font-bold text-green-600">$0.00</p>
                    </div>
                </div>
            </div>

            <!-- Column 3: AI Suggestions Engine -->
            <div class="bg-white p-6 rounded-2xl shadow-xs border border-gray-100 flex flex-col">
                <div class="flex items-center space-x-2 mb-4">
                    <span class="p-2 bg-purple-100 rounded-lg text-purple-700">✨</span>
                    <h2 class="text-xl font-bold text-gray-800">AI Finance Insights</h2>
                </div>
                
                <div id="aiConsole" class="flex-1 bg-purple-50/50 rounded-xl p-4 border border-purple-100 space-y-3 overflow-y-auto max-h-[380px]">
                    <!-- AI Insight text loads here dynamically -->
                </div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
