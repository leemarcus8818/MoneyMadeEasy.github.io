<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyMadeEasy Pro</title>
    <!-- Tailwind CSS for sleek layout -->
 <script src="https://jsdelivr.net"></script>
<link href="https://jsdelivr.net" rel="stylesheet">
    <!-- Chart.js for beautiful visual graphs -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-emerald-50/30 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- Header: Deep Dark Green Background -->
        <header class="flex justify-between items-center bg-emerald-950 p-6 rounded-2xl shadow-sm text-white">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-emerald-400">💰 MoneyMadeEasy</h1>
                <p class="text-sm text-emerald-200/70">Your AI-Powered Personal Wealth Companion</p>
            </div>
            <!-- Month Picker Tracker -->
            <div>
                <select id="monthFilter" onchange="updateUI()" class="bg-emerald-900 text-emerald-100 font-bold p-2 px-4 rounded-xl border border-emerald-800 focus:ring-2 focus:ring-emerald-400 focus:outline-none">
                    <option value="2026-06">June 2026</option>
                    <option value="2026-05">May 2026</option>
                    <option value="2026-04">April 2026</option>
                </select>
            </div>
        </header>

        <!-- Main Dashboard Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Column 1: Financial Input & Transactions -->
            <div class="bg-white p-6 rounded-2xl shadow-xs border border-emerald-100/50 space-y-4">
                <h2 class="text-xl font-bold text-emerald-950">Add Transaction</h2>
                <div class="space-y-3">
                    <input id="desc" type="text" placeholder="Description (e.g., Target, Salary)" class="w-full p-3 bg-emerald-50/20 rounded-xl border border-emerald-100 focus:outline-emerald-600">
                    <input id="amount" type="number" placeholder="Amount (e.g., 2500 or -45)" class="w-full p-3 bg-emerald-50/20 rounded-xl border border-emerald-100 focus:outline-emerald-600">
                    
                    <select id="category" class="w-full p-3 bg-emerald-50/20 rounded-xl border border-emerald-100 focus:outline-emerald-600">
                        <option value="Income">💰 Income / Paycheck</option>
                        <option value="Housing">🏠 Rent / Housing</option>
                        <option value="Food">🍔 Food & Dining</option>
                        <option value="Transport">🚗 Gas / Transit</option>
                        <option value="Leisure">🎉 Entertainment / Fun</option>
                        <option value="Savings">📈 Investments / Savings</option>
                    </select>

                    <!-- Dark Green Button -->
                    <button onclick="addTransaction()" class="w-full bg-emerald-800 hover:bg-emerald-900 text-white font-bold p-3 rounded-xl transition-all shadow-md shadow-emerald-100">Log Item</button>
                </div>

                <hr class="border-emerald-50 my-4">

                <h3 class="font-bold text-emerald-900 mb-2">Monthly History</h3>
                <ul id="list" class="divide-y divide-emerald-50 max-h-60 overflow-y-auto pr-1"></ul>
            </div>

            <!-- Column 2: Visual Category Breakdown -->
            <div class="bg-white p-6 rounded-2xl shadow-xs border border-emerald-100/50 flex flex-col justify-between">
                <div>
                    <h2 class="text-xl font-bold text-emerald-950 mb-1">Category Breakdown</h2>
                    <p class="text-xs text-emerald-600 mb-4">Where your hard-earned cash goes</p>
                </div>
                <div class="w-full max-w-[280px] mx-auto min-h-[240px]">
                    <canvas id="categoryChart"></canvas>
                </div>
                <div class="mt-4 pt-4 border-t border-emerald-50 flex justify-between">
                    <div>
                        <p class="text-xs text-gray-400">Total Expenses</p>
                        <p id="totalExpense" class="text-xl font-bold text-red-600">$0.00</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-gray-400">Net Savings</p>
                        <p id="balance" class="text-xl font-bold text-emerald-600">$0.00</p>
                    </div>
                </div>
            </div>

            <!-- Column 3: AI Suggestions Engine -->
            <div class="bg-white p-6 rounded-2xl shadow-xs border border-emerald-100/50 flex flex-col">
                <div class="flex items-center space-x-2 mb-4">
                    <span class="p-2 bg-emerald-100 rounded-lg text-emerald-800">✨</span>
                    <h2 class="text-xl font-bold text-emerald-950">AI Finance Insights</h2>
                </div>
                
                <div id="aiConsole" class="flex-1 bg-emerald-50/10 rounded-xl p-4 border border-emerald-100/40 space-y-3 overflow-y-auto max-h-[380px]">
                    <!-- AI Insight text loads here dynamically -->
                </div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
