<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MoneyMadeEasy Tracker</title>
    <!-- Tailwind CSS for instant clean styling -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">💰 MoneyMadeEasy</h1>

        <!-- Balance Display -->
        <div class="bg-green-50 p-4 rounded-lg mb-4">
            <p class="text-sm text-green-700">Current Balance</p>
            <p id="balance" class="text-3xl font-extrabold text-green-900">$0.00</p>
        </div>

        <!-- Transaction Form -->
        <div class="space-y-3">
            <input id="desc" type="text" placeholder="Description (e.g., Groceries)" class="w-full p-2 border rounded">
            <input id="amount" type="number" placeholder="Amount (e.g., -50 or 200)" class="w-full p-2 border rounded">
            <button onclick="addTransaction()" class="w-full bg-blue-600 text-white p-2 rounded font-bold hover:bg-blue-700">Add Transaction</button>
        </div>

        <!-- History -->
        <h3 class="font-bold text-gray-700 mt-6 mb-2">Transaction History</h3>
        <ul id="list" class="divide-y divide-gray-200"></ul>
    </div>
    <script src="app.js"></script>
</body>
</html>
